<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BridgeSign</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <div class="popup-logo">SF</div>
      <div class="popup-title">BridgeSign</div>
      <div class="popup-version">v0.1.0 MVP</div>
    </div>

    <div class="popup-status" id="popup-status">
      <div class="status-indicator" id="status-indicator">
        <div class="status-dot"></div>
        <span class="status-label">Not in a meeting</span>
      </div>
    </div>

    <div class="popup-error" id="popup-error" style="display: none;"></div>

    <div class="popup-actions" id="signer-actions" style="display: none; text-align: center; margin-bottom: 12px; padding: 0 16px;">
      <button id="btn-start-capture" style="width: 100%; padding: 10px; background: #22c55e; border: none; border-radius: 6px; color: white; font-weight: 600; cursor: pointer;">🎙️ Start Audio Capture</button>
      <div style="font-size: 11px; color: #a3a3a3; margin-top: 6px;">Required to generate live subtitles</div>
    </div>

    <div class="popup-info" id="popup-info">
      <div class="info-row">
        <span class="info-label">Room</span>
        <span class="info-value" id="info-room">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Role</span>
        <span class="info-value" id="info-role">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">Sync</span>
        <div class="sync-status">
          <span class="info-value" id="info-sync">Disconnected</span>
          <span class="latency-badge" id="info-latency" style="display: none;">0ms</span>
        </div>
      </div>
      <div class="info-row">
        <span class="info-label">Peers</span>
        <span class="info-value" id="info-peers">—</span>
      </div>
    </div>

    <div class="popup-info">
      <div class="info-label" style="padding: 0 4px;">Relay Server URL</div>
      <div class="server-config">
        <input type="text" id="info-server" class="server-input" placeholder="ws://172.20.10.8:3001" />
        <button id="btn-save-server" class="btn-save">Save</button>
      </div>
    </div>

    <div class="popup-info">
      <div class="info-label" style="padding: 0 4px;">Sign Planner URL</div>
      <div class="server-config">
        <input type="text" id="info-planner" class="server-input" placeholder="http://172.20.10.8:8001" />
        <button id="btn-save-planner" class="btn-save">Save</button>
      </div>
    </div>

    <div class="popup-actions">
      <a class="popup-link" href="https://bridgesign.dev" target="_blank">About BridgeSign</a>
    </div>

    <div class="popup-footer">
      <span>Open Google Meet to start using BridgeSign</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
